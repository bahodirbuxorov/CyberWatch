version: "3.9"

services:
  # ──────────────────────────────────────────
  # Nitter — self-hosted X (Twitter) frontend
  # ──────────────────────────────────────────
  nitter:
    image: zedeus/nitter:latest
    container_name: cyberwatch-nitter
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NITTER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────
  # CyberWatch UZ Bot
  # ──────────────────────────────────────────
  bot:
    build: .
    container_name: cyberwatch-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      nitter:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # Nitter self-hosted instance ga prioritet berish
      - NITTER_SELF_HOSTED_URL=http://nitter:8080
